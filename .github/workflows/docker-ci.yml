name: Docker Build and Bake Checks

# El flujo se ejecutará cada vez que se haga un push o un pull request a la rama principal
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  docker-validation:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Configurar QEMU (útil para soportar múltiples arquitecturas si es necesario)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Paso 3: Configurar Docker Buildx (Obligatorio para usar funciones avanzadas y Bake)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =================================================================
      # REQUISITO 1: Realizar las comprobaciones de compilación (docker/build)
      # =================================================================
      - name: Test Build with docker/build-push-action
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false # Importante: 'false' para que solo compruebe la compilación sin subirla a ningún lado

      # =================================================================
      # REQUISITO 2: Ejecutar comprobaciones con docker/bake
      # =================================================================
      - name: Test Build with docker/bake-action
        uses: docker/bake-action@v3
        with:
          push: false # Solo realiza la comprobación del archivo bake sin publicar